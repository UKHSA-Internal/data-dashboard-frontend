# Project name
sonar.projectName=data-dashboard-frontend

# Project key
sonar.projectKey=UKHSA-Internal_winter-pressures-frontend

# Organization
sonar.organization=ukhsa-internal

# Playwright fixture callbacks use a parameter named "use", which sonar can
# missclassify as a React Hook call. Playwright assertions also often live in
# fixture/page helper methods rather than directly in the top-level test body
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S6440
sonar.issue.ignore.multicriteria.e1.resourceKey=e2e/**/*.ts
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S2699
sonar.issue.ignore.multicriteria.e2.resourceKey=e2e/**/*.ts