name: IaC Checkov Scan

on:
  push:
    branches:
    - suyash-kumar2-patch-1

jobs:
  checkov:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
          ref: suyash-kumar2-patch-1

    - name: Install Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Install Checkov
      run: pip install checkov

    - name: Run Checkov Scan
      run: checkov --directory . --soft-fail --output json --output-file-path checkov_report.json

   # - name: Generate Report
      #run: checkov -d . --output junitxml > checkov-report.xml

    - name: Upload Checkov Report
      uses: actions/upload-artifact@v3
      with:
        name: checkov-report
        path: checkov_report.json
