name: IaC Scan

on:
  push:
    branches:
      - suyash-kumar2-patch-1

jobs:
  scan_iac:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          ref: suyash-kumar2-patch-1

      - name: Pull Docker Image
        run: docker pull bridgecrew/checkov

      - name: Create Directory and Generate File
        run: |
         mkdir -p ./.github/workflows/artifacts
         echo "This is the Checkov report." > ./.github/workflows/artifacts/checkov_report.json
          
      - name: Run Checkov Scan
        run: |
          docker run --rm --volume ${{ github.workspace }}:/tf bridgecrew/checkov --directory /tf --soft-fail \
            bridgecrew/checkov --output json --output-file-path /tf/checkov_report.json
          
      - name: Upload Checkov Report
        uses: actions/upload-artifact@v3
        with:
          name: checkov-report
          path: ./.github/workflows/artifacts/checkov_report.json
